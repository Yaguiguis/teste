<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Você está brava comigo?</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    font-family: 'Segoe UI', Arial, sans-serif;
    padding: 20px;
  }

  .container {
    text-align: center;
    max-width: 600px;
    width: 100%;
  }

  h1 {
    color: #ff2d2d;
    font-size: clamp(28px, 6vw, 48px);
    text-shadow: 0 0 20px rgba(255, 45, 45, 0.6);
    margin-bottom: 40px;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  .buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  button {
    padding: 16px 45px;
    font-size: 20px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  button:hover {
    transform: translateY(-3px) scale(1.05);
  }

  #btnSim {
    background: #ff2d2d;
    color: white;
    box-shadow: 0 4px 15px rgba(255, 45, 45, 0.5);
  }

  #btnNao {
    background: #2dff6e;
    color: #0a0a0a;
    box-shadow: 0 4px 15px rgba(45, 255, 110, 0.5);
  }

  .resultado {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 0.6s ease forwards;
  }

  .resultado.ativo {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  img, video {
    max-width: 100%;
    width: 380px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
  }

  .mensagem {
    font-size: clamp(20px, 4.5vw, 28px);
    font-weight: bold;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
  }

  .voltar {
    margin-top: 10px;
    background: transparent;
    color: #aaa;
    border: 1px solid #666;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: normal;
    border-radius: 8px;
  }

  .voltar:hover {
    color: #fff;
    border-color: #fff;
  }
</style>
</head>
<body>

  <div class="container">

    <div id="pergunta">
      <h1>VOCÊ ESTÁ BRAVA COMIGO?</h1>
      <div class="buttons">
        <button id="btnSim" onclick="mostrar('sim')">SIM</button>
        <button id="btnNao" onclick="mostrar('nao')">NÃO</button>
      </div>
    </div>

    <div id="respostaSim" class="resultado">
      <img src="assets/triste.png" alt="Emoji triste">
      <p class="mensagem">me desculpa 🥺</p>
      <button class="voltar" onclick="voltar()">voltar</button>
    </div>

    <div id="respostaNao" class="resultado">
      <video src="assets/video.mp4" controls autoplay playsinline></video>
      <p class="mensagem">me desculpa mesmo assim, mais eu te amo ❤️</p>
      <button class="voltar" onclick="voltar()">voltar</button>
    </div>

  </div>

<script>
  function mostrar(opcao) {
    document.getElementById('pergunta').style.display = 'none';

    const video = document.querySelector('#respostaNao video');

    if (opcao === 'sim') {
      document.getElementById('respostaSim').classList.add('ativo');
      document.getElementById('respostaNao').classList.remove('ativo');
      video.pause();
    } else {
      document.getElementById('respostaNao').classList.add('ativo');
      document.getElementById('respostaSim').classList.remove('ativo');
    }
  }

  function voltar() {
    document.getElementById('pergunta').style.display = 'block';
    document.getElementById('respostaSim').classList.remove('ativo');
    document.getElementById('respostaNao').classList.remove('ativo');
    document.querySelector('#respostaNao video').pause();
  }
</script>

</body>
</html>
